<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسالة اعتذار لسيدرا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            overflow: hidden;
            transition: background-color 2s ease, color 2s ease;
        }

        /* حالة الظلام والمطر */
        .weather-dark {
            background-color: #111827; 
            color: #F3F4F6;
        }
        
        .weather-dark::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
            animation: lightning 8s infinite;
        }

        @keyframes lightning {
            0%, 94%, 98%, 100% { opacity: 0; }
            95%, 99% { opacity: 1; }
        }

        /* حالة الفرح والشمس */
        .weather-happy {
            background-color: #38BDF8; 
            color: #1E3A8A;
        }

        #rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            transition: opacity 1s ease;
        }

        .drop {
            position: absolute;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.8));
            width: 2px;
            height: 25px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); }
            100% { transform: translateY(110vh); }
        }

        /* الشمس */
        .sun {
            position: absolute;
            top: -150px; 
            right: 50px;
            width: 120px;
            height: 120px;
            background: #FDE047;
            border-radius: 50%;
            box-shadow: 0 0 60px #FDE047, 0 0 100px #FACC15;
            transition: top 2s cubic-bezier(0.34, 1.56, 0.64, 1); 
            z-index: 2;
        }

        .weather-happy .sun {
            top: 40px;
        }

        /* الغيوم */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        
        .weather-happy .cloud {
            opacity: 0.9;
        }

        /* البطاقة الزجاجية */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 2s ease;
            position: relative;
            z-index: 10;
        }

        .weather-happy .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* الإيموجي المتطاير */
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s ease;
            z-index: 5;
        }

        .weather-happy .floating-emoji {
            opacity: 1;
            transform: translateY(-50vh) rotate(360deg);
            animation: float-up 4s ease-in infinite alternate;
        }

        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-30px) rotate(20deg); }
        }

        /* مؤشر الآلة الكاتبة */
        .typing-cursor::after {
            content: '|';
            animation: blink 0.7s infinite;
            color: inherit;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* إخفاء الزر في البداية */
        #forgive-btn {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 1s ease;
        }
        
        #forgive-btn.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

    </style>
</head>
<body class="weather-dark flex items-center justify-center min-h-screen relative p-4">

    <!-- الشمس -->
    <div class="sun"></div>

    <!-- الغيوم -->
    <div class="cloud" style="top: 20%; left: 10%; width: 150px; height: 50px;">
        <div style="top: -30px; left: 20px; width: 70px; height: 70px;" class="absolute background-white rounded-full bg-white"></div>
        <div style="top: -20px; right: 20px; width: 60px; height: 60px;" class="absolute background-white rounded-full bg-white"></div>
    </div>
    <div class="cloud" style="top: 40%; right: 10%; width: 200px; height: 60px;">
        <div style="top: -40px; left: 30px; width: 90px; height: 90px;" class="absolute background-white rounded-full bg-white"></div>
        <div style="top: -25px; right: 30px; width: 70px; height: 70px;" class="absolute background-white rounded-full bg-white"></div>
    </div>

    <!-- المطر -->
    <div id="rain-container"></div>

    <!-- إيموجي الفرح -->
    <div class="floating-emoji" style="left: 15%; bottom: 20%; animation-delay: 0s;">🌻</div>
    <div class="floating-emoji" style="left: 80%; bottom: 30%; animation-delay: 1s;">🌸</div>
    <div class="floating-emoji" style="left: 30%; bottom: 10%; animation-delay: 0.5s;">💖</div>
    <div class="floating-emoji" style="left: 70%; bottom: 15%; animation-delay: 1.5s;">🦋</div>

    <!-- البطاقة الرئيسية -->
    <div class="glass-card rounded-3xl p-8 md:p-12 max-w-lg w-full text-center shadow-2xl min-h-[400px] flex flex-col justify-between">
        
        <div id="text-wrapper" class="flex-grow">
            <!-- النصوص فارغة في البداية لأن الجافاسكريبت سيكتبها -->
            <h1 id="main-title" class="text-3xl md:text-4xl font-extrabold mb-6 leading-tight min-h-[80px]"></h1>
            
            <p id="main-text" class="text-lg md:text-xl mb-8 leading-relaxed opacity-90 min-h-[120px]"></p>
        </div>

        <div>
            <button id="forgive-btn" class="relative overflow-hidden bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-full shadow-lg transform active:scale-95 text-xl mx-auto block">
                سامحتك 🥺
            </button>
        </div>

        <!-- التوقيع -->
        <div class="mt-8 pt-4 border-t border-gray-500 border-opacity-30">
            <p class="text-sm opacity-70 font-semibold" id="signature">من إعداد قيس جازي</p>
        </div>
    </div>

    <script>
        // توليد المطر
        const rainContainer = document.getElementById('rain-container');
        const dropCount = 100;

        for (let i = 0; i < dropCount; i++) {
            let drop = document.createElement('div');
            drop.classList.add('drop');
            drop.style.left = Math.random() * 100 + 'vw';
            drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
            drop.style.animationDelay = (Math.random() * 2) + 's';
            drop.style.opacity = Math.random() * 0.5 + 0.2;
            rainContainer.appendChild(drop);
        }

        // متغيرات النصوص
        const sadTitle = "يا أجمل سيدرا بالدنيا..<br> أنا آسف 😔";
        const sadText = "بعتذر كتير إني غطيت بالنوم وطولت عليكي.. وتلفوني كان طافي وما قدرت أرد.<br><br>بدونك وبدون رضاكي، الدنيا كلها عتمة ومطر وكئيبة. بتسامحيني؟";
        
        const happyTitle = "يا روحي إنتي! 🥰☀️";
        const happyText = "رجعت الشمس وضحكت الدنيا.. <br><br> شكراً لقلبك الحلو اللي بيسامح بسرعة، الله يسعدك وما يحرمني منك يا رب!";

        const titleEl = document.getElementById('main-title');
        const textEl = document.getElementById('main-text');
        const btn = document.getElementById('forgive-btn');
        const signature = document.getElementById('signature');

        // دالة الآلة الكاتبة
        async function typeWriter(element, htmlString, speed = 50) {
            element.innerHTML = "";
            element.classList.add('typing-cursor'); // إضافة المؤشر النابض
            
            let tempStr = "";
            for (let i = 0; i < htmlString.length; i++) {
                // إذا وجدنا وسم HTML (مثل <br>) نقوم بإضافته كاملاً دفعة واحدة
                if (htmlString[i] === '<') {
                    let tag = "";
                    while (htmlString[i] !== '>' && i < htmlString.length) {
                        tag += htmlString[i];
                        i++;
                    }
                    tag += '>';
                    tempStr += tag;
                    element.innerHTML = tempStr;
                } else {
                    tempStr += htmlString[i];
                    element.innerHTML = tempStr;
                    // انتظار قليل بين كل حرف وحرف
                    await new Promise(r => setTimeout(r, speed));
                }
            }
            element.classList.remove('typing-cursor'); // إزالة المؤشر بعد الانتهاء
        }

        // بدء الكتابة عند تحميل الصفحة
        window.onload = async () => {
            await typeWriter(titleEl, sadTitle, 60);
            await new Promise(r => setTimeout(r, 500)); // استراحة قصيرة بين العنوان والنص
            await typeWriter(textEl, sadText, 40);
            
            // إظهار الزر بعد انتهاء الكتابة
            btn.classList.add('show');
        };

        // تفاعل زر المسامحة
        btn.addEventListener('click', async () => {
            // إخفاء الزر
            btn.classList.remove('show');
            setTimeout(() => { btn.style.display = 'none'; }, 1000);

            // تحويل الجو إلى شمس وفرح
            document.body.classList.remove('weather-dark');
            document.body.classList.add('weather-happy');
            rainContainer.style.opacity = '0';

            // تعديل ألوان النص لتناسب الخلفية الفاتحة
            titleEl.style.color = '#1e293b'; 
            textEl.style.color = '#1e293b';
            signature.style.color = '#64748b';

            // مسح النص القديم بحركة سريعة
            titleEl.innerHTML = "";
            textEl.innerHTML = "";

            // كتابة النص الجديد المفرح
            await new Promise(r => setTimeout(r, 1000)); // انتظار حتى تشرق الشمس قليلاً
            await typeWriter(titleEl, happyTitle, 70);
            await new Promise(r => setTimeout(r, 300));
            await typeWriter(textEl, happyText, 50);
        });

    </script>
</body>
</html>
